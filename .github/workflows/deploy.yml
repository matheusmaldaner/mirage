# auto-deploys the site to cloudflare pages on every push to main
# requires repo secrets CLOUDFLARE_API_TOKEN (Pages: Edit) and CLOUDFLARE_ACCOUNT_ID
name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: verify SEO files
        run: |
          if [ ! -f public/robots.txt ]; then echo "Missing public/robots.txt"; exit 1; fi
          if [ ! -f public/sitemap.xml ]; then echo "Missing public/sitemap.xml"; exit 1; fi
          grep -q "<title>" public/index.html || { echo "Missing title in public/index.html"; exit 1; }
          grep -q "canonical" public/index.html || { echo "Missing canonical in public/index.html"; exit 1; }
      - name: deploy to cloudflare pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # run from public/ so wrangler finds public/functions and bundles the Pages Functions
          workingDirectory: public
          command: pages deploy . --project-name=mirage --branch=main
