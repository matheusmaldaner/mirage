<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MIRAGE - Comparar Modelos</title>

    <link rel="icon" href="images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="css/header.css">
    <link rel="stylesheet" type="text/css" href="css/compare_models.css">
    <link rel="stylesheet" type="text/css" href="css/models_display.css">
    <link rel="stylesheet" type="text/css" href="css/scss/bootstrapmods.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/gh/hoomanbahreini/bootstrap-half-and-quarter-grid/fractional-grid.min.css"
          rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary-color: #10724f;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --light-text: #666;
            --accent-color: #24b47e;
            --border-radius: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        body { font-family: 'Montserrat', sans-serif; color: var(--text-color); }
        #prompt-submission-container,
        #model-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: none;
            padding: 1.5rem;
            margin: 1.5rem;
            transition: var(--transition);
        }
        .model-box {
            transition: var(--transition);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .model-box.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(16, 114, 79, 0.5);
        }
        .btn-success {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            transition: var(--transition);
            border-radius: var(--border-radius);
            font-weight: 500;
        }
        .btn-success:hover {
            background-color: #0d5f42;
            border-color: #0d5f42;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: var(--border-radius);
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(16, 114, 79, 0.25);
        }
        #comparison-results .result {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid #dee2e6;
            padding: 1rem;
            transition: var(--transition);
        }
        #comparison-results .result:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
        #comparison-results .result.highlighted {
            background-color: #f7fcfa;
            border-color: var(--primary-color);
        }
        .loading-overlay { background: rgba(255, 255, 255, 0.9); }
        .loader { border-top-color: var(--primary-color); }
        .rate-limit-banner {
            display: none;
            background-color: #fff3cd;
            color: #664d03;
            border: 1px solid #ffecb5;
            border-radius: var(--border-radius);
            padding: 0.75rem 1rem;
            margin: 1rem 1.5rem;
            font-size: 0.95rem;
        }
        .rate-limit-banner.visible { display: block; }
    </style>
</head>

<body>
    <div class="container-fluid" id="header">
        <div class="row align-items-center" style="padding-top: 1%;">
            <div class="col-12 col-md-2 d-flex" style="padding-left: 30px;">
                <p id="logo-WeAudit" onclick="window.location.href='/'"> Mirage </p>
            </div>
            <div class="col-12 col-md-10 d-flex justify-content-end align-items-center flex-wrap" style="padding-right: 30px;">
                <a href="https://github.com/matheusmaldaner/mirage" target="_blank"
                   style="color: var(--primary-color); text-decoration: none; margin-right: 1rem; font-weight: 500;">
                    <i class="fab fa-github"></i> Source
                </a>
                <a href="https://arxiv.org/abs/2511.21547" target="_blank"
                   style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                    <i class="fas fa-file-pdf"></i> Paper
                </a>
            </div>
        </div>
    </div>

    <div id="rate-limit-banner" class="rate-limit-banner">
        <i class="fas fa-info-circle"></i>
        <span id="rate-limit-message"></span>
    </div>

    <div id="input-and-questions-wrapper">
        <div id="image-preloader" style="display:none; visibility:hidden; height:0; width:0; overflow:hidden;"></div>

        <div id="prompt-submission-container">
            <h5 class="mb-4" style="color: var(--primary-color); font-weight: 600;">Gerador de Imagens</h5>

            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Digite seu prompt aqui" id="prompt-input">
                <button class="btn btn-success" id="generate-button" onclick="generateModels()">
                    <i class="fas fa-magic me-2"></i>Generate
                </button>
            </div>

            <div id="model-selection-wrapper">
                <h6 class="mt-4 mb-3" style="color: var(--primary-color); font-weight: 500;">Selecione até 4 modelos</h6>
                <div id="model-selection-container" class="d-flex flex-wrap mb-3"></div>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-outline-success" id="toggle-models-button" onclick="toggleModels()">
                    <i class="fas fa-layer-group me-2"></i>Mostrar Modelos
                </button>
            </div>
        </div>
    </div>

    <div id="model-container">
        <h5 class="mb-4" style="color: var(--primary-color); font-weight: 600;">Resultados da Geração</h5>
        <div class="flex-box rounded-borders" id="comparison-results"></div>
    </div>

    <div id="image-modal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background-color: var(--primary-color); color: white;">
                    <h5 class="modal-title">Pré-visualização da Imagem</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                            style="background-color: white;"></button>
                </div>
                <div class="modal-body">
                    <img class="modal-content" id="pop-up-image" style="width: 100%; height: auto;">
                </div>
            </div>
        </div>
    </div>

    <div id="loading-animation" class="loading-overlay hidden">
        <div class="loader"></div>
        <p style="margin-top: 20px; font-weight: 500; color: var(--primary-color);">Gerando Imagens...</p>
    </div>

    <script type="module" src="js/constants.js"></script>
    <script type="module" src="js/compare.js"></script>
</body>
</html>
